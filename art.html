<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Art Attack – Symphony 2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: white; }
    header {
      background: linear-gradient(135deg, #6a0dad, #ff4ecd);
      text-align: center;
      padding: 40px 20px;
    }
    header h1 { font-size: 2.5em; }
    header p { margin-top: 10px; opacity: 0.9; font-size: 1.1em; }
    .back {
      display: inline-block;
      margin: 20px;
      color: #ff4ecd;
      text-decoration: none;
      font-size: 1em;
    }
    .back:hover { text-decoration: underline; }
    .form-box {
      max-width: 500px;
      margin: 10px auto 50px;
      background: #1e1e1e;
      border: 1px solid #6a0dad;
      border-radius: 12px;
      padding: 30px;
    }
    .form-box h2 { color: #ff4ecd; margin-bottom: 20px; text-align: center; }
    label { display: block; margin-bottom: 5px; opacity: 0.8; font-size: 0.9em; }
    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 18px;
      background: #111;
      border: 1px solid #6a0dad;
      border-radius: 8px;
      color: white;
      font-size: 1em;
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #6a0dad, #ff4ecd);
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 1.1em;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { opacity: 0.9; }
    .success { display: none; text-align: center; margin-top: 20px; color: #ff4ecd; font-size: 1.1em; }
    footer { text-align: center; padding: 20px; background: #1a1a1a; opacity: 0.6; font-size: 0.85em; }
  </style>
</head>
<body>

  <header>
    <h1> Art Attack</h1>
    <p>No filter needed. Bring your raw creativity and let the canvas do the talking. 🖌️</p>
  </header>

  <a href="index.html" class="back">← Back to Symphony 2026</a>

  <div class="form-box">
    <h2>Register Your Entry</h2>

    <label>Your Full Name</label>
    <input type="text" placeholder="e.g. Fiona Kotak" />

    <label>College Roll Number</label>
    <input type="text" placeholder="e.g. 2023CS101" />

    <label>Email Address</label>
    <input type="email" placeholder="your@email.com" />

    <label>Phone Number</label>
    <input type="tel" placeholder="10-digit number" />

    <label>Art Category</label>
    <select>
      <option>Painting</option>
      <option>Digital Art</option>
      <option>Photography</option>
      <option>Sculpture</option>
      <option>Sketch / Illustration</option>
      <option>Mixed Media</option>
    </select>

    <label>Title of Your Work</label>
    <input type="text" placeholder="Give your piece a name" />

    <label>Brief Description of Your Art</label>
    <textarea rows="3" placeholder="What's the vibe? What inspired you?"></textarea>

    <label>Will you need easel / display stand?</label>
    <select>
      <option>Yes please</option>
      <option>No, I'll bring my own</option>
      <option>Not sure yet</option>
    </select>

    <button onclick="document.querySelector('.success').style.display='block'">
      Submit Registration
    </button>
    <div class="success">Entry received! Can't wait to see your work. </div>
  </div>

  <footer>
    <p>Made by Fiona Kotak | PR Team, KJSCE Student Council</p>
  </footer>

</body>
</html>
